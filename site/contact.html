<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Suspended</title>
  <style>
    @font-face {
      font-family: "Horizon";
      src:
        url("Horizon.woff2") format("woff2"),
        url("Horizon.woff") format("woff"),
        url("Horizon.otf") format("opentype"),
        url("Horizon.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Playfair Display";
      src:
        url("PlayfairDisplay-Regular.woff2") format("woff2"),
        url("PlayfairDisplay-Regular.woff") format("woff"),
        url("PlayfairDisplay-Regular.otf") format("opentype"),
        url("PlayfairDisplay-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Playfair Display";
      src:
        url("PlayfairDisplay-Italic.woff2") format("woff2"),
        url("PlayfairDisplay-Italic.woff") format("woff"),
        url("PlayfairDisplay-Italic.otf") format("opentype"),
        url("PlayfairDisplay-Italic.ttf") format("truetype");
      font-weight: 400;
      font-style: italic;
      font-display: swap;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #dfff00;
      --brown: #341905;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--brown);
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 52rem;
      width: 100%;
    }

    .graphic {
      width: min(100%, 28rem);
      height: auto;
      display: block;
      margin-bottom: 3.5rem;
    }

    h1 {
      font-family: "Horizon", sans-serif;
      font-size: clamp(2.25rem, 8vw, 4.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.1;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    @media (min-width: 48rem) {
      h1 {
        white-space: nowrap;
        font-size: clamp(2.5rem, 4.5vw, 4.5rem);
      }
    }

    p {
      font-size: clamp(1.25rem, 3.2vw, 2rem);
      line-height: 1.55;
      max-width: 42rem;
    }

    #site-url {
      font-style: italic;
    }

    .action-btn {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.85rem 2.25rem;
      font-family: "Horizon", sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--bg);
      background-color: var(--brown);
      border: 2px solid var(--brown);
    }

    .action-btn:hover,
    .action-btn:focus-visible {
      color: var(--brown);
      background-color: transparent;
    }

    .action-btn[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="content">
      <img class="graphic" src="Reach.svg" alt="Cat reaching out of a hole" width="725" height="246">
      <h1 id="heading">Site Suspended</h1>
      <p id="message">Due to a billing issue <span id="site-url"></span> is currently unavailable.</p>
      <a id="action-btn" class="action-btn" href="#" hidden>Pay Now</a>
    </div>
  </main>
  <script>
    (function () {
      var heading = document.getElementById("heading");
      var message = document.getElementById("message");
      var siteUrl = document.getElementById("site-url");
      var actionBtn = document.getElementById("action-btn");
      var hostname = window.location.hostname || window.location.host;

      function normalizeHostname(host) {
        return (host || "").toLowerCase().replace(/^www\./, "");
      }

      function showActionButton(label, url) {
        if (!/^https?:\/\//i.test(url)) return;
        actionBtn.textContent = label;
        actionBtn.href = url;
        actionBtn.removeAttribute("hidden");
      }

      function showForSale(entry) {
        document.title = entry.heading || "Domain For Sale";
        heading.textContent = entry.heading || "Domain For Sale";
        message.textContent = entry.message || "This domain is available for purchase.";
        showActionButton(entry.buttonLabel || "Buy Domain", entry.buyUrl);
      }

      function showSuspended() {
        document.title = "Site Suspended";
        heading.textContent = "Site Suspended";
        message.innerHTML = 'Due to a billing issue <span id="site-url"></span> is currently unavailable.';
        siteUrl = document.getElementById("site-url");
        siteUrl.textContent = hostname;

        fetch("payment.txt")
          .then(function (res) {
            if (!res.ok) return;
            return res.text();
          })
          .then(function (text) {
            if (!text) return;
            var url = text.trim().split(/\s+/)[0];
            showActionButton("Pay Now", url);
          })
          .catch(function () {});
      }

      var currentHost = normalizeHostname(hostname);

      fetch("domains.json")
        .then(function (res) {
          if (!res.ok) throw new Error("domains.json unavailable");
          return res.json();
        })
        .then(function (data) {
          var entries = (data && data.forSale) || [];
          var match = entries.find(function (entry) {
            return normalizeHostname(entry.domain) === currentHost;
          });

          if (match) {
            showForSale(match);
          } else {
            showSuspended();
          }
        })
        .catch(function () {
          showSuspended();
        });
    })();
  </script>
</body>
</html>
